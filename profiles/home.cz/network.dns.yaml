        - { "target_hosts": ["www.seznamzpravy.cz"], "query_type": "A", "nameservers": ["193.17.47.1"] }
        - { "target_hosts": ["www.aktualne.cz"], "query_type": "A", "nameservers": ["8.8.8.8"] }
