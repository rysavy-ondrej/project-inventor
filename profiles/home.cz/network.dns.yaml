monitors:
  - name: network.dns
    module: network_dns
    exec: src/network/network.dns

# DNS resolution monitoring for services a typical CZECH home user connects to.
# Targets are resolved through the public resolvers a Czech home user is most
# likely configured with: Google (8.8.8.8), Cloudflare (1.1.1.1) and the
# CZ.NIC ODVR open resolver (193.17.47.1). Targets are grouped per category.
schedule:
  - test: network.dns
    write-to: home.cz.dns.streaming
    targets:
        - { "target_hosts": ["www.netflix.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.youtube.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["voyo.nova.cz"], "query_type": "A", "nameservers": ["193.17.47.1"] }
        - { "target_hosts": ["www.ceskatelevize.cz"], "query_type": "A", "nameservers": ["193.17.47.1"] }
        - { "target_hosts": ["open.spotify.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.max.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
    repeat-every: 3m

  - test: network.dns
    write-to: home.cz.dns.gaming
    targets:
        - { "target_hosts": ["store.steampowered.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.playstation.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.xbox.com"], "query_type": "A", "nameservers": ["193.17.47.1"] }
        - { "target_hosts": ["www.epicgames.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.nintendo.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.riotgames.com"], "query_type": "A", "nameservers": ["193.17.47.1"] }
    repeat-every: 3m

  - test: network.dns
    write-to: home.cz.dns.social
    targets:
        - { "target_hosts": ["www.facebook.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.instagram.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.tiktok.com"], "query_type": "A", "nameservers": ["193.17.47.1"] }
        - { "target_hosts": ["www.reddit.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["x.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["discord.com"], "query_type": "A", "nameservers": ["193.17.47.1"] }
