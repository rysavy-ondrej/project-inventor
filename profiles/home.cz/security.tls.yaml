monitors:
  - name: security.tls
    module: security_tls
    exec: src/security/security.tls

# TLS handshake monitoring (port 443, modern TLSv1.3) for services a typical
# CZECH home user connects to. Targets are grouped per service category. The
# 'banking' category is especially relevant for TLS health in a Czech home.
schedule:
  - test: security.tls
    write-to: home.cz.tls.streaming
    targets:
        - { "target_host": "www.netflix.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.youtube.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "voyo.nova.cz", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.ceskatelevize.cz", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "open.spotify.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.max.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
