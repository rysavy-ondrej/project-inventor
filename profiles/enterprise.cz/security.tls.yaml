monitors:
  - name: security.tls
    module: security_tls
    exec: src/security/security.tls

# TLS handshake monitoring (port 443, TLSv1.2) for the cloud/SaaS
# services a CZECH enterprise depends on. Targets are grouped per
# business-service category. Identity providers and the Czech eGovernment
# portals are watched most aggressively, since a TLS failure on the SSO gateway
# or a statutory portal (data boxes, tax) blocks business-critical access.
schedule:
  - test: security.tls
    write-to: enterprise.cz.tls.collaboration
    targets:
        - { "target_host": "teams.microsoft.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-RSA-AES256-GCM-SHA384"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "slack.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-RSA-AES256-GCM-SHA384"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "zoom.us", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-RSA-AES256-GCM-SHA384"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.webex.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-RSA-AES256-GCM-SHA384"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "mail.google.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-RSA-AES256-GCM-SHA384"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
    repeat-every: 5m

