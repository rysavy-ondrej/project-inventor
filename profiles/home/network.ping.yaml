monitors:
  - name: network.ping
    module: network_ping
    exec: src/network/network.ping

# Ping (latency / reachability) monitoring for services a typical home user
# connects to. Each schedule entry groups targets into a service category and
# writes to its own output file so results can be analysed per category.
schedule:
  - test: network.ping
    write-to: home.ping.streaming
    targets:
        - { "target_host": "www.netflix.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.youtube.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.disneyplus.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.primevideo.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.twitch.tv", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "open.spotify.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 1m

  - test: network.ping
    write-to: home.ping.gaming
    targets:
        - { "target_host": "store.steampowered.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.playstation.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.xbox.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.epicgames.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.nintendo.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.riotgames.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 1m

  - test: network.ping
    write-to: home.ping.social
    targets:
        - { "target_host": "www.facebook.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.instagram.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.tiktok.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.reddit.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "x.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "discord.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 2m

  - test: network.ping
    write-to: home.ping.news
    targets:
        - { "target_host": "www.bbc.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.cnn.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.nytimes.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.theguardian.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "news.google.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 5m

  - test: network.ping
    write-to: home.ping.shopping
    targets:
        - { "target_host": "www.amazon.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.ebay.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.aliexpress.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.walmart.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 5m

  - test: network.ping
    write-to: home.ping.cloud
    targets:
        - { "target_host": "www.google.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "outlook.office365.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.icloud.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "www.dropbox.com", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
        - { "target_host": "zoom.us", "packet_size": 64, "packet_count": 3, "interpacket_delay": 1, "timeout": 5 }
    repeat-every: 2m
