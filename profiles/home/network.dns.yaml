monitors:
  - name: network.dns
    module: network_dns
    exec: src/network/network.dns

# DNS resolution monitoring for services a typical home user connects to.
# Targets are resolved through the most common public resolvers a home user
# is likely configured with (Google 8.8.8.8, Cloudflare 1.1.1.1,
# Quad9 9.9.9.9). Targets are grouped per service category.
schedule:
  - test: network.dns
    write-to: home.dns.streaming
    targets:
        - { "target_hosts": ["www.netflix.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.youtube.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.disneyplus.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.primevideo.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.twitch.tv"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["open.spotify.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
    repeat-every: 3m

  - test: network.dns
    write-to: home.dns.gaming
    targets:
        - { "target_hosts": ["store.steampowered.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.playstation.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.xbox.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.epicgames.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.nintendo.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.riotgames.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
    repeat-every: 3m

  - test: network.dns
    write-to: home.dns.social
    targets:
        - { "target_hosts": ["www.facebook.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.instagram.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.tiktok.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.reddit.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["x.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["discord.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
    repeat-every: 5m

  - test: network.dns
    write-to: home.dns.news
    targets:
        - { "target_hosts": ["www.bbc.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.cnn.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.nytimes.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.theguardian.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
    repeat-every: 5m

  - test: network.dns
    write-to: home.dns.shopping
    targets:
        - { "target_hosts": ["www.amazon.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["www.ebay.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.aliexpress.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.walmart.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
    repeat-every: 5m

  - test: network.dns
    write-to: home.dns.cloud
    targets:
        - { "target_hosts": ["www.google.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["outlook.office365.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.icloud.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.dropbox.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["zoom.us"], "query_type": "A", "nameservers": ["1.1.1.1"] }
    repeat-every: 3m
