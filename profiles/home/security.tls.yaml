        - { "target_host": "www.twitch.tv", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-ECDSA-AES256-GCM-SHA384", "ECDHE-RSA-AES256-GCM-SHA384", "ECDHE-ECDSA-AES128-GCM-SHA256", "ECDHE-RSA-AES128-GCM-SHA256", "ECDHE-ECDSA-CHACHA20-POLY1305", "ECDHE-RSA-CHACHA20-POLY1305"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
