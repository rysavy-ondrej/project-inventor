monitors:
  - name: security.tls
    module: security_tls
    exec: src/security/security.tls

# TLS handshake monitoring (port 443, TLSv1.2) for services a typical
# home user connects to. Targets are grouped per service category so the TLS
# health of each category can be tracked independently.
#
# Cipher policy: each target offers only modern, secure cipher suites — all
# ECDHE (forward secrecy) with AEAD (AES-GCM or ChaCha20-Poly1305), in both
# ECDSA and RSA variants so the test passes regardless of the server's
# certificate key type. A 'completed' result therefore means the server
# negotiated a current, strong cipher; a 'handshake_failure' means it offered
# none of them — a genuine security finding. Weak/legacy ciphers (CBC, static
# RSA, 3DES, RC4) are intentionally excluded so the test can never pass on
# insecure crypto.
schedule:
  - test: security.tls
    write-to: home.tls.streaming
    targets:
        - { "target_host": "www.netflix.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-ECDSA-AES256-GCM-SHA384", "ECDHE-RSA-AES256-GCM-SHA384", "ECDHE-ECDSA-AES128-GCM-SHA256", "ECDHE-RSA-AES128-GCM-SHA256", "ECDHE-ECDSA-CHACHA20-POLY1305", "ECDHE-RSA-CHACHA20-POLY1305"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.youtube.com", "target_port": 443, "tls_version": "TLSv1.2", "cipher_suites": ["ECDHE-ECDSA-AES256-GCM-SHA384", "ECDHE-RSA-AES256-GCM-SHA384", "ECDHE-ECDSA-AES128-GCM-SHA256", "ECDHE-RSA-AES128-GCM-SHA256", "ECDHE-ECDSA-CHACHA20-POLY1305", "ECDHE-RSA-CHACHA20-POLY1305"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
