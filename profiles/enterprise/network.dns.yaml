monitors:
  - name: network.dns
    module: network_dns
    exec: src/network/network.dns

# DNS resolution monitoring for the cloud/SaaS services an enterprise depends on.
# Names are resolved through resolvers commonly deployed in enterprise networks:
# Cisco Umbrella / OpenDNS (208.67.222.222), Cloudflare (1.1.1.1), Quad9 (9.9.9.9)
# and Google (8.8.8.8). Targets are grouped per business-service category so the
# resolution health of each can be tracked independently.
schedule:
  - test: network.dns
    write-to: enterprise.dns.collaboration
    targets:
        - { "target_hosts": ["teams.microsoft.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["slack.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["zoom.us"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.webex.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["mail.google.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
    repeat-every: 1m

  - test: network.dns
    write-to: enterprise.dns.saas
    targets:
        - { "target_hosts": ["outlook.office365.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["login.salesforce.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["www.servicenow.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.workday.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["accounts.sap.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
    repeat-every: 2m

  - test: network.dns
    write-to: enterprise.dns.identity
    targets:
        - { "target_hosts": ["login.microsoftonline.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["www.okta.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["duo.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.pingidentity.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["auth0.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
    repeat-every: 1m

  - test: network.dns
    write-to: enterprise.dns.devops
    targets:
        - { "target_hosts": ["github.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["gitlab.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["registry-1.docker.io"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["pypi.org"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["registry.npmjs.org"], "query_type": "A", "nameservers": ["208.67.222.222"] }
    repeat-every: 3m

  - test: network.dns
    write-to: enterprise.dns.cloud
    targets:
        - { "target_hosts": ["console.aws.amazon.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["portal.azure.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["console.cloud.google.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["management.azure.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
        - { "target_hosts": ["ec2.amazonaws.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
    repeat-every: 2m

  - test: network.dns
    write-to: enterprise.dns.security
    targets:
        - { "target_hosts": ["dash.cloudflare.com"], "query_type": "A", "nameservers": ["208.67.222.222"] }
        - { "target_hosts": ["www.zscaler.com"], "query_type": "A", "nameservers": ["1.1.1.1"] }
        - { "target_hosts": ["falcon.crowdstrike.com"], "query_type": "A", "nameservers": ["9.9.9.9"] }
        - { "target_hosts": ["www.proofpoint.com"], "query_type": "A", "nameservers": ["8.8.8.8"] }
    repeat-every: 5m
