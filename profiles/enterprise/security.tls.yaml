monitors:
  - name: security.tls
    module: security_tls
    exec: src/security/security.tls

# TLS handshake monitoring (port 443, modern TLSv1.3) for the cloud/SaaS
# services an enterprise depends on. Targets are grouped per business-service
# category so the TLS health of each category can be tracked independently.
# Identity providers are watched most aggressively, since an SSO/TLS failure
# blocks access to every downstream application.
schedule:
  - test: security.tls
    write-to: enterprise.tls.collaboration
    targets:
        - { "target_host": "teams.microsoft.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "slack.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "zoom.us", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "www.webex.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
        - { "target_host": "mail.google.com", "target_port": 443, "tls_version": "TLSv1.3", "cipher_suites": ["TLS_AES_128_GCM_SHA256"], "elliptic_curves": [], "extensions": [], "timeout": 6 }
    repeat-every: 5m

  - test: security.tls
