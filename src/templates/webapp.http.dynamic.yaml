monitors:
  - name: webapp.http.dynamic
    module: monitor_webapp_dynamic_analysis
    exec: src/webapp/webapp.dynamic

schedule:
  - test: webapp.http.dynamic
    write-to: webapp.http.dynamic
    hash-fields: [ { "src": "visited_pages.image", "trg": "visited_pages.image-hash" } ]
    omit-fields: [ "visited_pages.image" ]
    targets:
      # https://www.example.com
      - {
        "replay_script": "",
        "timing_between_steps": 400,
        "timeout": 30000
        }
    repeat-every: 5m
